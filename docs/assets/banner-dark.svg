<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" role="img" aria-labelledby="title desc">
  <title id="title">a2a-mcp-skillmap</title>
  <desc id="desc">Turn any A2A agent into an MCP tool server. Dynamic skill discovery, multimodal output, stdio + HTTP transports.</desc>

  <defs>
    <pattern id="grid-d" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#27272a" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="1280" height="320" fill="#0b0b0d"/>
  <rect width="1280" height="320" fill="url(#grid-d)"/>

  <!-- hairline frame -->
  <rect x="0.5" y="0.5" width="1279" height="319" fill="none" stroke="#3f3f46" stroke-width="1"/>

  <!-- left column: A2A source -->
  <g transform="translate(120, 120)">
    <rect x="0" y="0" width="180" height="80" rx="4" fill="#18181b" stroke="#fafafa" stroke-width="1.5"/>
    <text x="90" y="34" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="600" fill="#fafafa">A2A agent</text>
    <text x="90" y="54" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#a1a1aa">skills + tasks</text>
  </g>

  <!-- left connector -->
  <g stroke="#fafafa" stroke-width="1.5" fill="none">
    <path d="M 300 160 L 420 160"/>
    <polygon points="420,160 412,156 412,164" fill="#fafafa"/>
  </g>
  <text x="360" y="148" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" fill="#a1a1aa">JSON-RPC</text>

  <!-- center: bridge -->
  <g transform="translate(420, 80)">
    <rect x="0" y="0" width="440" height="160" rx="6" fill="#18181b" stroke="#fafafa" stroke-width="2"/>
    <text x="220" y="58" text-anchor="middle" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="30" font-weight="700" letter-spacing="-0.5" fill="#fafafa">a2a-mcp-skillmap</text>
    <text x="220" y="88" text-anchor="middle" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="400" fill="#a1a1aa">dynamic skill discovery · multimodal output · zero glue code</text>

    <!-- tool pills -->
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#fafafa">
      <rect x="40"  y="112" width="84" height="26" rx="13" fill="none" stroke="#fafafa" stroke-width="1"/>
      <text x="82"  y="129" text-anchor="middle">stdio</text>

      <rect x="134" y="112" width="84" height="26" rx="13" fill="none" stroke="#fafafa" stroke-width="1"/>
      <text x="176" y="129" text-anchor="middle">HTTP</text>

      <rect x="228" y="112" width="84" height="26" rx="13" fill="none" stroke="#fafafa" stroke-width="1"/>
      <text x="270" y="129" text-anchor="middle">bearer</text>

      <rect x="322" y="112" width="84" height="26" rx="13" fill="none" stroke="#fafafa" stroke-width="1"/>
      <text x="364" y="129" text-anchor="middle">api_key</text>
    </g>
  </g>

  <!-- right connector -->
  <g stroke="#fafafa" stroke-width="1.5" fill="none">
    <path d="M 860 160 L 980 160"/>
    <polygon points="980,160 972,156 972,164" fill="#fafafa"/>
  </g>
  <text x="920" y="148" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" fill="#a1a1aa">MCP</text>

  <!-- right column: MCP client -->
  <g transform="translate(980, 120)">
    <rect x="0" y="0" width="180" height="80" rx="4" fill="#18181b" stroke="#fafafa" stroke-width="1.5"/>
    <text x="90" y="34" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="600" fill="#fafafa">MCP client</text>
    <text x="90" y="54" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#a1a1aa">text · image · audio</text>
  </g>
</svg>
