name: Publish to npm

# Fires when a GitHub Release is published from the UI (or via `gh release create`).
# The release tag MUST match the version in package.json (e.g., v0.1.0).
#
# Prerequisites (set once per repo):
#   - Secret   NPM_TOKEN       — npm "automation" access token with publish rights.
#   - Variable ENABLE_NPM_PUBLISH — set to "true" to enable publishing.
#
# Until both are set, the publish job short-circuits with a clear message
# so a Release created on a private/not-yet-configured repo still produces
# a helpful log instead of a cryptic authentication failure.

on:
  release:
    types: [published]

jobs:
  verify:
    name: Lint, type-check, test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - run: npm install
      - run: npm run lint
      - run: npm run test:coverage
      - run: npm run build

      - name: Check that package.json version matches release tag
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          TAG="${{ github.event.release.tag_name }}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "Release tag $TAG does not match package.json version $PKG_VERSION"
            echo "Bump package.json (and CHANGELOG) before cutting the release."
            exit 1
          fi

  publish:
    name: Publish to npm registry
    runs-on: ubuntu-latest
    needs: verify
    # Only run when the operator has explicitly opted in. This keeps the
    # workflow safe to leave enabled on a private repo; flip the variable
    # to "true" once NPM_TOKEN is added and you're ready to publish.
    if: vars.ENABLE_NPM_PUBLISH == 'true'
    permissions:
      contents: read
      id-token: write # required for npm provenance

    steps:
      - uses: actions/checkout@v4

      - name: Preflight — require NPM_TOKEN
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "::error::ENABLE_NPM_PUBLISH is true but the NPM_TOKEN secret is empty."
            echo "Add an npm automation token at Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: https://registry.npmjs.org

      - run: npm install
      # `npm publish` runs prepublishOnly, which executes `npm run build`
      # and ships the full compiled output (source maps + declaration maps
      # included — this is an open-source package).
      - name: Publish
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  skipped:
    name: Publish skipped (not enabled)
    runs-on: ubuntu-latest
    needs: verify
    if: vars.ENABLE_NPM_PUBLISH != 'true'
    steps:
      - run: |
          echo "npm publish is disabled for this repo."
          echo "To enable: add the ENABLE_NPM_PUBLISH repo variable with value 'true',"
          echo "and add the NPM_TOKEN secret (npm automation token)."
          echo "Both live under Settings → Secrets and variables → Actions."
